version: '3.8'
services:
  app:
    build: .
    ports:
      - "80:3000"
    environment:
      - DB_HOST=db
      - FRONTEND_URL=https://dj-mm.net
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: musicdb
      POSTGRES_USER: musicuser
      POSTGRES_PASSWORD: strong_password_here
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: